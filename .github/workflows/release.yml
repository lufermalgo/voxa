name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    runs-on: macos-14  # Apple Silicon (M1) runner
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build --target aarch64-apple-darwin

      - name: Create release and upload assets
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find the .dmg file
          DMG=$(find src-tauri/target -name "*.dmg" -type f | head -1)
          if [ -z "$DMG" ]; then
            echo "No .dmg file found!"
            find src-tauri/target -name "*.dmg" -o -name "*.app" | head -20
            exit 1
          fi
          echo "Found DMG: $DMG"

          # Create release and upload in one step
          gh release create "${{ github.ref_name }}" \
            --title "Voxa ${{ github.ref_name }}" \
            --notes "See the [full changelog](https://github.com/${{ github.repository }}/compare/v1.0.2...${{ github.ref_name }})." \
            "$DMG"
