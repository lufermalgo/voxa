<!DOCTYPE html>

                        "on-surface": "#e5e2e3",
                        "tertiary": "#c6c6c6",

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 300, 'GRAD' 0, 'opsz' 20;
            font-size: 18px;
        }
        .obsidian-glass {
            background: rgba(19, 19, 20, 0.7);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
        }
        .waveform-aura {
            filter: drop-shadow(0 0 4px rgba(203, 190, 255, 0.3));
        }
        @keyframes wave-pulse {
            0%, 100% { height: 1px; opacity: 0.4; }
            50% { height: 4px; opacity: 1; }
        }
        .animate-wave {
            animation: wave-pulse 1.2s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-background text-on-surface font-body min-h-screen overflow-hidden flex flex-col">
<!-- macOS Desktop Mockup Background -->
<div class="fixed inset-0 z-0">
<div class="absolute inset-0 bg-cover bg-center" data-alt="Abstract cinematic background with deep indigo and violet gradients, soft light leaks, and premium obsidian textures." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuBAxsTotuDeHX6moKygrx3KNKQEZIA_Spbl6fcpkgfH9of-wxhakFyzNuIzVa-6lddgnL4GG4z-WmehVG34yRbDn8r1Qtl-uGrZC5NMAVDF0nCprjgfk7Fc-vrPJ1I226noGQ0z_vk3MMD92D_MkdPJRFsiu_3DxiWF6bRwRTrkMJLArKaywiMLnDkQWq68Tic8-u7EibeJ8KcQTh728jgPXZGXgLkLD-HEePLhmsCXTE36mzzYV05_KFO9NIH100MN1lsrrCEeeAJd')"></div>
<div class="absolute inset-0 bg-black/40 backdrop-blur-[2px]"></div>
</div>
<!-- Top Menu Bar -->
<header class="fixed top-0 left-0 w-full z-50 flex items-center justify-between px-4 h-8 bg-black/30 backdrop-blur-md text-[13px] font-medium text-white/90">
<div class="flex items-center space-x-4">
<span class="material-symbols-outlined scale-110">ios</span>
<span class="font-bold">Voxa</span>
<span class="opacity-80">File</span>
<span class="opacity-80">Edit</span>
<span class="opacity-80">View</span>
<span class="opacity-80">Format</span>
<span class="opacity-80">Tools</span>
<span class="opacity-80">Window</span>
</div>
<div class="flex items-center space-x-4">
<span class="material-symbols-outlined">wifi</span>
<span class="material-symbols-outlined">battery_5_bar</span>
<div class="flex items-center space-x-1 px-2 py-0.5 bg-white/20 rounded">
<span class="material-symbols-outlined text-primary scale-90" style="font-variation-settings: 'FILL' 1;">graphic_eq</span>
</div>
<span class="opacity-90">Tue 12 Sep 10:42 AM</span>
<span class="material-symbols-outlined">search</span>
<span class="material-symbols-outlined">toggle_off</span>
</div>
</header>
<!-- Ultra Minimal Voice Bar at Bottom Center -->
<div class="fixed bottom-10 left-1/2 -translate-x-1/2 z-50">
<div class="obsidian-glass h-[6px] w-[40px] rounded-full flex items-center justify-center shadow-2xl border border-white/5 relative">
<!-- Glow effect -->
<div class="absolute inset-0 bg-gradient-to-r from-primary/10 via-transparent to-primary/10 rounded-full"></div>
<!-- Center: Ultra Thin Waveform -->
<div class="flex items-center gap-[1.5px] h-full waveform-aura">
<div class="w-[1.5px] bg-primary-fixed/50 rounded-full animate-wave" style="animation-delay: 0.2s"></div>
<div class="w-[1.5px] bg-primary-fixed rounded-full animate-wave" style="animation-delay: 0.4s"></div>
<div class="w-[1.5px] bg-primary-fixed rounded-full animate-wave" style="animation-delay: 0.6s"></div>
<div class="w-[1.5px] bg-primary-fixed rounded-full animate-wave" style="animation-delay: 0.8s"></div>
<div class="w-[1.5px] bg-primary-fixed/50 rounded-full animate-wave" style="animation-delay: 1.0s"></div>
</div>
</div>
</div>
<!-- Side Decoration -->
<div class="fixed left-8 bottom-8 z-10 opacity-30">
<div class="flex items-end space-x-1 h-32">
<div class="w-1 bg-primary-container rounded-full h-[60%]"></div>
